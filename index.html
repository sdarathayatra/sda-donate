<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SDA Ratha Yatra 2026 Donation</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, Helvetica, sans-serif;
    min-height:100vh;
    background:
    linear-gradient(
        rgba(0,0,0,0.55),
        rgba(0,0,0,0.55)
    ),
    url('jagannath-bg.jpg');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

.card{
    width:100%;
    max-width:500px;

    background:rgba(255,255,255,0.15);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.2);

    border-radius:25px;

    padding:30px;

    text-align:center;

    color:white;

    box-shadow:0 8px 32px rgba(0,0,0,0.4);
}

.logo{
    width:90px;
    margin-bottom:10px;
}

h1{
    font-size:32px;
    margin-bottom:10px;
}

.subtitle{
    font-size:16px;
    margin-bottom:25px;
    opacity:0.95;
}

.button{
    display:block;
    width:100%;
    text-decoration:none;
    padding:16px;
    border-radius:12px;
    margin-bottom:15px;
    font-size:18px;
    font-weight:bold;
    transition:0.3s;
}

.button:hover{
    transform:translateY(-2px);
}

.phonepe{
    background:#5f259f;
    color:white;
}

.gpay{
    background:white;
    color:black;
}

.upi{
    background:#ff9900;
    color:white;
}

.qr-section{
    margin-top:25px;
}

.qr{
    width:220px;
    border-radius:12px;
    background:white;
    padding:10px;
}

.upi-id{
    margin-top:15px;
    font-size:16px;
    font-weight:bold;
    word-break:break-all;
}

.trust{
    margin-top:12px;
    font-size:14px;
    opacity:0.9;
}

.footer{
    margin-top:25px;
    font-size:13px;
    opacity:0.8;
}

</style>
</head>

<body>

<div class="card">

    <!-- Optional Logo -->
    <!--
    <img src="logo.png" class="logo">
    -->

    <h1>🙏 SDA Ratha Yatra 2026</h1>

    <div class="subtitle">
        Support the divine festival by contributing any amount.
    </div>

    <!-- PhonePe -->
    <a class="button phonepe"
       href="phonepe://pay?pa=dreamacresdivinejagannathtrust@sbi&pn=Dream%20Acres%20Divine%20Jagannath%20Trust&cu=INR">
       📱 Donate via PhonePe
    </a>

    <!-- Google Pay -->
    <a class="button gpay"
       href="intent://pay?pa=dreamacresdivinejagannathtrust@sbi&pn=Dream%20Acres%20Divine%20Jagannath%20Trust&cu=INR#Intent;scheme=upi;package=com.google.android.apps.nbu.paisa.user;end">
       💳 Donate via Google Pay
    </a>

    <!-- Generic UPI -->
    <a class="button upi"
       href="upi://pay?pa=dreamacresdivinejagannathtrust@sbi&pn=Dream%20Acres%20Divine%20Jagannath%20Trust&cu=INR">
       🚀 Donate via Any UPI App
    </a>

    <div class="qr-section">

        <img src="qr.png" class="qr">

        <div class="upi-id">
            dreamacresdivinejagannathtrust@sbi
        </div>

        <div class="trust">
            Dream Acres Divine Jagannath Trust
        </div>

    </div>

    <div class="footer">
        Thank you for supporting SDA Ratha Yatra 2026 🙏
    </div>

</div>

</body>
</html>
